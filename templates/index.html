<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗云 - 究极吟诗程序</title>
<style>
  :root {
    --bg-primary: #0a0a1a;
    --bg-secondary: #111128;
    --bg-card: #1a1a3e;
    --gold: #d4a843;
    --gold-light: #f0c040;
    --gold-dark: #b08a30;
    --jade: #2d8a6e;
    --jade-light: #3dba8e;
    --cinnabar: #c23b22;
    --text-primary: #e8dcc8;
    --text-secondary: #a89880;
    --text-muted: #6a6050;
    --border: #2a2a4e;
    --shadow: rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "Songti SC", Georgia, serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

  .container { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* Header */
  header { text-align: center; padding: 40px 0 30px; position: relative; }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  header h1 {
    font-size: 4em; font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.3em; text-shadow: none;
    position: relative;
  }
  header h1::before {
    content: '☁'; position: absolute; left: -0.6em; top: -0.15em;
    font-size: 0.5em; opacity: 0.3; -webkit-text-fill-color: var(--gold);
  }
  header h1::after {
    content: '☁'; position: absolute; right: -0.6em; top: -0.15em;
    font-size: 0.5em; opacity: 0.3; -webkit-text-fill-color: var(--gold);
  }
  .subtitle {
    font-size: 1.1em; color: var(--text-secondary); margin-top: 10px;
    letter-spacing: 0.5em;
  }
  .subtitle em { font-style: normal; color: var(--gold); }

  /* Card */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 20px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: var(--gold-dark); }
  .card-title {
    font-size: 1em; color: var(--gold); margin-bottom: 16px;
    letter-spacing: 0.2em; font-weight: 700;
  }

  /* Form */
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label {
    display: block; font-size: 0.85em; color: var(--text-secondary);
    margin-bottom: 6px; letter-spacing: 0.1em;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-primary); font-size: 1em;
    font-family: inherit; transition: border-color 0.3s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--gold);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group select { cursor: pointer; }
  .form-group select option { background: var(--bg-secondary); }

  .charset-info {
    font-size: 0.8em; color: var(--text-muted); margin-top: 4px;
  }

  /* Buttons */
  .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .btn {
    padding: 10px 28px; border: none; border-radius: 8px;
    font-size: 1em; font-family: inherit; font-weight: 700;
    cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    color: var(--bg-primary);
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,168,67,0.3); }
  .btn-danger {
    background: var(--cinnabar); color: white;
  }
  .btn-danger:hover:not(:disabled) { background: #d4452a; transform: translateY(-1px); }
  .btn-warning {
    background: var(--cinnabar); color: white;
  }
  .btn-warning:hover:not(:disabled) { background: #d4452a; transform: translateY(-1px); }
  .btn-jade {
    background: var(--jade); color: white;
  }
  .btn-jade:hover:not(:disabled) { background: var(--jade-light); transform: translateY(-1px); }

  /* Stats */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .stat-item {
    text-align: center; padding: 12px;
    background: var(--bg-secondary); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .stat-item .value {
    font-size: 1.4em; font-weight: 700; color: var(--gold-light);
    font-variant-numeric: tabular-nums;
  }
  .stat-item .label {
    font-size: 0.8em; color: var(--text-secondary); margin-top: 4px;
  }
  .stat-item .unit { font-size: 0.7em; color: var(--text-muted); }

  /* Progress */
  .progress-section { margin-bottom: 20px; }
  .progress-bar {
    height: 8px; background: var(--bg-secondary); border-radius: 4px;
    overflow: hidden; border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--jade), var(--gold));
    border-radius: 4px; transition: width 0.3s ease;
  }
  .progress-text {
    display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 0.8em; color: var(--text-muted);
  }

  /* Save progress */
  .save-progress {
    display: none; margin-top: 12px; padding: 12px;
    background: rgba(45,138,110,0.1); border: 1px solid var(--jade);
    border-radius: 8px;
  }
  .save-progress.active { display: block; }
  .save-progress .save-bar {
    height: 6px; background: var(--bg-secondary); border-radius: 3px;
    overflow: hidden; margin-top: 8px;
  }
  .save-progress .save-fill {
    height: 100%; width: 0%;
    background: var(--jade-light); border-radius: 3px;
    transition: width 0.3s ease;
  }
  .save-progress .save-text {
    font-size: 0.85em; color: var(--text-secondary);
  }

  /* Results */
  .results-container {
    position: relative;
  }
  .results-area {
    height: 400px; overflow-y: auto; padding: 16px;
    background: var(--bg-secondary); border-radius: 8px;
    border: 1px solid var(--border);
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 1.1em; line-height: 2;
  }
  .results-area:empty::after {
    content: '等待吟诗... 点击「开始吟诗」按钮开启枚举之旅';
    display: block; text-align: center; color: var(--text-muted);
    font-style: italic; padding: 80px 20px;
  }
  .result-item {
    display: inline-block; margin: 2px 4px; padding: 1px 8px;
    background: rgba(212,168,67,0.08); border-radius: 4px;
    animation: fadeIn 0.3s ease;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .result-item:hover { background: rgba(212,168,67,0.2); }
  .result-count {
    font-size: 0.8em; color: var(--text-muted); text-align: right;
    margin-top: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Warning */
  .warning {
    display: none; padding: 12px 16px;
    background: rgba(194,59,34,0.1); border: 1px solid var(--cinnabar);
    border-radius: 8px; color: #e87060; font-size: 0.9em;
    margin-bottom: 16px;
  }
  .warning.active { display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    padding: 14px 28px; background: var(--bg-card);
    border: 1px solid var(--gold); border-radius: 8px;
    color: var(--text-primary); font-size: 0.9em;
    opacity: 0; transition: all 0.4s ease;
    z-index: 1000; pointer-events: none;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Format helpers */
  .text-muted { color: var(--text-muted); }
  .text-gold { color: var(--gold); }

  /* Mode toggle */
  .mode-toggle { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-option {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; background: var(--bg-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 0.3s; font-size: 0.9em;
    user-select: none;
  }
  .mode-option:has(input:checked) {
    border-color: var(--gold); background: rgba(212,168,67,0.1);
  }
  .mode-option input { display: none; }
  .mode-option:hover { border-color: var(--gold-dark); }

  .inline-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Poetry cards */
  .poem-card {
    background: linear-gradient(135deg, rgba(30,30,30,0.95), rgba(45,35,20,0.95));
    border: 1px solid var(--gold-dark); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 16px;
    position: relative; animation: poemFadeIn 0.5s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .poem-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M20,30 Q40,20 60,30 Q80,40 70,60 Q60,80 40,70 Q20,60 30,40" fill="none" stroke="%23d4a843" stroke-width="2"/><path d="M50,10 L55,25 L70,30 L55,35 L50,50 L45,35 L30,30 L45,25 Z" fill="%23d4a843" opacity="0.05"/></svg>') no-repeat;
    background-size: cover; pointer-events: none;
  }
  .poem-index {
    font-size: 0.75em; color: var(--gold-dark); margin-bottom: 12px;
    letter-spacing: 0.2em; font-weight: 300;
  }
  .poem-body { position: relative; z-index: 1; }
  .poem-line {
    font-size: 1.3em; line-height: 2; letter-spacing: 0.3em;
    text-align: center; color: var(--text-primary);
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    text-shadow: 0 0 20px rgba(212,168,67,0.1);
    transition: color 0.3s;
  }
  .poem-line:hover { color: var(--gold-light); }
  .poem-line::before { content: '「'; color: var(--gold-dark); opacity: 0.4; }
  .poem-line::after { content: '」'; color: var(--gold-dark); opacity: 0.4; }
  .poem-divider {
    border: none; border-top: 1px solid var(--gold-dark);
    margin: 8px auto; width: 60%; opacity: 0.2;
  }
  .poem-partial { opacity: 0.5; font-style: italic; }

  @keyframes poemFadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Checkbox */
  .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .checkbox-group input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--gold);
    cursor: pointer;
  }

  @media (max-width: 640px) {
    header h1 { font-size: 2.5em; }
    .container { padding: 12px; }
    .form-row { flex-direction: column; }
    .form-group { min-width: 100%; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>诗云</h1>
    <p class="subtitle">—— <em>究极吟诗程序</em> ——</p>
  </header>

  <!-- Warning -->
  <div class="warning" id="warning"></div>

  <!-- Save progress -->
  <div class="save-progress" id="saveProgress">
    <div class="save-text" id="saveText">保存中...</div>
    <div class="save-bar">
      <div class="save-fill" id="saveFill"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="card-title">⚙ 配置</div>
    <div class="form-row">
      <div class="form-group">
        <label>模式</label>
        <div class="mode-toggle">
          <label class="mode-option" id="modeEnum">
            <input type="radio" name="mode" value="enum" checked>
            <span>🔢 枚举模式</span>
          </label>
          <label class="mode-option" id="modePoetry">
            <input type="radio" name="mode" value="poetry">
            <span>📜 吟诗模式</span>
          </label>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" id="maxLenGroup">
        <label id="maxLenLabel">最大长度</label>
        <input type="number" id="maxLength" value="2" min="0" max="6" step="1">
        <div id="poetryOptions" style="display:none">
          <div class="inline-group" style="margin-top:4px">
            <label class="mode-option" style="padding:4px 10px;font-size:0.85em"><input type="radio" name="lineLength" value="5" checked><span>五言</span></label>
            <label class="mode-option" style="padding:4px 10px;font-size:0.85em"><input type="radio" name="lineLength" value="7"><span>七言</span></label>
            <input type="number" id="customLineLen" value="5" min="1" max="20" style="width:60px;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:inherit;text-align:center;font-size:0.85em">
            <span style="font-size:0.8em;color:var(--text-muted)">自定义</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>预设字符集</label>
        <select id="presetSelect">
          {% for key, info in presets.items() %}
          <option value="{{ key }}">{{ info.label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>自定义字符集 <span class="text-muted">(留空则使用预设)</span></label>
        <textarea id="customCharset" rows="2" placeholder="在此输入自定义字符..."></textarea>
        <div class="charset-info" id="charsetInfo" style="margin-top:4px">字符数: 0 | 估算组合: 0</div>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:0">
      <div class="btn-group">
        <button class="btn btn-primary" id="startBtn">☁ 开始吟诗</button>
        <button class="btn btn-warning" id="pauseBtn" style="display:none">⏸ 暂停</button>
        <button class="btn btn-primary" id="resumeBtn" style="display:none">▶ 继续</button>
        <button class="btn btn-danger" id="stopBtn" disabled>✕ 停止</button>
        <button class="btn btn-jade" id="saveBtn" disabled>💾 保存结果</button>
        <button class="btn btn-jade" id="saveStateBtn" disabled style="display:none">📦 保存状态</button>
    </div>
    <div class="checkbox-group" style="margin-left:auto">
      <input type="checkbox" id="compressCheck" checked>
      <label for="compressCheck" style="color:var(--text-secondary);font-size:0.85em">Gzip压缩保存</label>
    </div>
  </div>
</div>

  <!-- Saved states -->
  <div class="card" id="statesCard" style="display:none">
    <div class="card-title">📂 已保存的状态</div>
    <div id="statesList"></div>
  </div>

  <!-- Restore card (auto-saved session detected) -->
  <div class="card" id="restoreCard" style="display:none;border-color:var(--gold-dark)">
    <div class="card-title" style="color:var(--gold)">♻ 检测到上次的会话</div>
    <div id="restoreInfo" style="margin-bottom:12px;font-size:0.9em;color:var(--text-secondary)"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="restoreBtn" style="font-size:0.85em">▶ 恢复并继续</button>
      <button class="btn btn-danger" id="dismissRestoreBtn" style="font-size:0.85em">✕ 放弃</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="card">
    <div class="card-title">📊 实时状态</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="value" id="genCount">0</div>
        <div class="label" id="genCountLabel">已生成</div>
      </div>
      <div class="stat-item">
        <div class="value" id="totalEstimate">0</div>
        <div class="label" id="totalEstimateLabel">估算总数</div>
      </div>
      <div class="stat-item">
        <div class="value" id="genRate">0</div>
        <div class="label" style="display:inline">速率</div>
        <span class="unit">/s</span>
      </div>
      <div class="stat-item">
        <div class="value" id="genElapsed">0</div>
        <div class="label">用时</div>
        <span class="unit">s</span>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">等待开始...</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <!-- Results -->
  <div class="card results-container">
    <div class="card-title" style="display:flex;justify-content:space-between">
      <span>☁ 吟诗流</span>
      <span class="text-muted" style="font-size:0.8em;font-weight:400" id="resultCounter">显示 0 条</span>
    </div>
    <div class="results-area" id="resultsArea"></div>
    <div id="pauseOverlay" style="display:none;text-align:center;padding:20px;color:var(--gold);font-size:1.2em">⏸ 已暂停</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const PRESETS_URL = '/api/presets';
let presetsData = {};
let eventSource = null;
let sessionId = 'default_' + Date.now();
let isRunning = false;
let isPaused = false;
let statsTimer = null;
let displayBuffer = [];
let displayTimer = null;
const MAX_DISPLAY = 5000;
let resultCount = 0;
let pausedState = null;

function formatNumStr(s) {
  if (s.length > 12) return '过大';
  const n = parseInt(s);
  if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
  return n.toLocaleString('zh-CN');
}

function formatNum(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
  if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
  return n.toLocaleString('zh-CN');
}

function formatTime(s) {
  if (s < 60) return s.toFixed(1);
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(0);
  return `${m}分${sec}秒`;
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// DOM refs
const maxLengthInput = document.getElementById('maxLength');
const presetSelect = document.getElementById('presetSelect');
const customCharset = document.getElementById('customCharset');
const charsetInfo = document.getElementById('charsetInfo');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resumeBtn = document.getElementById('resumeBtn');
const stopBtn = document.getElementById('stopBtn');
const saveBtn = document.getElementById('saveBtn');
const saveStateBtn = document.getElementById('saveStateBtn');
const compressCheck = document.getElementById('compressCheck');
const genCount = document.getElementById('genCount');
const totalEstimate = document.getElementById('totalEstimate');
const genRate = document.getElementById('genRate');
const genElapsed = document.getElementById('genElapsed');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const progressPercent = document.getElementById('progressPercent');
const resultsArea = document.getElementById('resultsArea');
const resultCounter = document.getElementById('resultCounter');
const warning = document.getElementById('warning');
const saveProgress = document.getElementById('saveProgress');
const saveText = document.getElementById('saveText');
const saveFill = document.getElementById('saveFill');
const pauseOverlay = document.getElementById('pauseOverlay');
const statesCard = document.getElementById('statesCard');
const statesList = document.getElementById('statesList');
const restoreCard = document.getElementById('restoreCard');
const restoreInfo = document.getElementById('restoreInfo');
const restoreBtn = document.getElementById('restoreBtn');
const dismissRestoreBtn = document.getElementById('dismissRestoreBtn');
const poetryOptions = document.getElementById('poetryOptions');
const modeRadios = document.querySelectorAll('input[name="mode"]');
const lineLengthRadios = document.querySelectorAll('input[name="lineLength"]');
const customLineLen = document.getElementById('customLineLen');
let currentMode = 'enum';

async function loadPresets() {
  try {
    const resp = await fetch(PRESETS_URL);
    presetsData = await resp.json();
    updateCharsetInfo();
  } catch(e) {
    console.error('加载预设失败:', e);
  }
}

function getCurrentChars() {
  const custom = customCharset.value.trim();
  if (custom) return custom;
  return '';
}

function getCurrentPreset() {
  const custom = customCharset.value.trim();
  if (custom) return '';
  return presetSelect.value;
}

function updateCharsetInfo() {
  const chars = getCurrentChars();
  const preset = getCurrentPreset();
  const maxLen = Math.max(1, parseInt(maxLengthInput.value) || 0);
  const mode = currentMode;
  const lineLen = getCurrentLineLength();

  const payload = preset
    ? { preset, max_length: mode === 'poetry' ? lineLen * 4 : maxLen, mode, line_length: lineLen, lines_per_poem: 4 }
    : { chars, max_length: mode === 'poetry' ? lineLen * 4 : maxLen, mode, line_length: lineLen, lines_per_poem: 4 };
  fetch('/api/estimate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(r => r.json())
    .then(data => {
      const totalStr = data.total;
      const isHuge = totalStr.length > 9 || (totalStr.length > 7 && maxLen > 3);
      let extra = '';
      if (mode === 'poetry' && data.total_raw && data.total_raw > 0 && !isHuge) {
        extra = ` | 约 ${formatNum(data.total_raw)} 首诗`;
      }
      document.getElementById('charsetInfo').textContent =
        `字符数: ${data.chars_len} | 估算${mode === 'poetry' ? '诗' : '组合'}: ${isHuge ? '过大' : formatNumStr(totalStr)}${extra}`;

      if (isHuge) {
        warning.textContent = '⚠ 警告: 组合总数过大，生成和保存可能需要大量时间和内存！建议先用小字符集（如数字）测试。';
        warning.classList.add('active');
      } else {
        warning.classList.remove('active');
      }
    })
    .catch(() => {
      document.getElementById('charsetInfo').textContent = `估算组合: 计算失败`;
    });
}

function getCurrentLineLength() {
  const custom = document.getElementById('customLineLen');
  const customVal = parseInt(custom.value);
  if (customVal > 0 && customVal <= 20) return customVal;
  return 5;
}

function getCurrentMode() { return currentMode; }

function setMode(mode) {
  currentMode = mode;
  for (const r of document.querySelectorAll('input[name="mode"]')) {
    r.checked = r.value === mode;
  }
  const poetryOpts = document.getElementById('poetryOptions');
  const maxLenInput = document.getElementById('maxLength');
  const maxLenLabel = document.getElementById('maxLenLabel');
  if (mode === 'poetry') {
    poetryOpts.style.display = '';
    maxLenInput.style.display = 'none';
    maxLenLabel.textContent = '行长度';
  } else {
    poetryOpts.style.display = 'none';
    maxLenInput.style.display = '';
    maxLenLabel.textContent = '最大长度';
  }
  updateCharsetInfo();
}

for (const r of document.querySelectorAll('input[name="mode"]')) {
  r.addEventListener('change', () => { if (r.checked) setMode(r.value); });
}
for (const r of document.querySelectorAll('input[name="lineLength"]')) {
  r.addEventListener('change', () => {
    if (r.checked) {
      document.getElementById('customLineLen').value = r.value;
      updateCharsetInfo();
    }
  });
}
document.getElementById('customLineLen').addEventListener('input', () => {
  for (const r of document.querySelectorAll('input[name="lineLength"]')) {
    r.checked = false;
  }
  updateCharsetInfo();
});
document.getElementById('customLineLen').addEventListener('focus', () => {
  for (const r of document.querySelectorAll('input[name="lineLength"]')) {
    r.checked = false;
  }
});

presetSelect.addEventListener('change', updateCharsetInfo);
customCharset.addEventListener('input', updateCharsetInfo);
maxLengthInput.addEventListener('input', updateCharsetInfo);

// SSE stream
let currentChars = '';
let currentPresetName = '';
let currentMaxLen = 1;

function startStream(resume = false) {
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }

  let url;
  const mode = currentMode;
  const baseParams = `session_id=${encodeURIComponent(sessionId)}&mode=${mode}&max_length=${currentMaxLen}`;
  if (mode === 'poetry') {
    const ll = getCurrentLineLength();
    const lpp = 4;
    if (currentPresetName) {
      url = `/stream?${baseParams}&preset=${encodeURIComponent(currentPresetName)}&line_length=${ll}&lines_per_poem=${lpp}`;
    } else {
      url = `/stream?${baseParams}&chars=${encodeURIComponent(currentChars)}&line_length=${ll}&lines_per_poem=${lpp}`;
    }
  } else {
    if (currentPresetName) {
      url = `/stream?${baseParams}&preset=${encodeURIComponent(currentPresetName)}`;
    } else {
      url = `/stream?${baseParams}&chars=${encodeURIComponent(currentChars)}`;
    }
  }
  if (resume) url += '&resume=1';
  eventSource = new EventSource(url);

  eventSource.onmessage = (e) => {
    if (!isRunning) isRunning = true;
    if (isPaused) isPaused = false;
    const item = e.data;
    displayBuffer.push(item);
    resultCount++;
    flushDisplay();
    // If poetry mode, update result counter for poems
    if (currentMode === 'poetry') {
      try {
        const parsed = JSON.parse(item);
        if (parsed.type === 'poem' && !parsed.partial) {
          document.getElementById('resultCounter').textContent = `显示 ${resultCount} 首`;
        }
      } catch(e2) {}
    }
  };

  eventSource.onerror = () => {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
    if (isRunning) {
      isRunning = false;
      updateUI();
      fetchStats();
    }
  };
}

function flushDisplay() {
  if (displayTimer) return;
  displayTimer = requestAnimationFrame(() => {
    displayTimer = null;
    const batch = displayBuffer.slice(0, 20);
    displayBuffer = displayBuffer.slice(20);

    const fragment = document.createDocumentFragment();
    const isPoetry = currentMode === 'poetry';
    const batchSize = batch.length;
    for (let i = 0; i < batchSize; i++) {
      const item = batch[i];
      if (isPoetry) {
        try {
          const parsed = JSON.parse(item);
          if (parsed.type === 'poem') {
            const card = document.createElement('div');
            card.className = 'poem-card' + (parsed.partial ? ' poem-partial' : '');
            const poemNum = resultCount - batchSize + i + 1;
            let html = `<div class="poem-index">第 ${poemNum} 首</div>`;
            html += '<div class="poem-body">';
            for (let i = 0; i < parsed.lines.length; i++) {
              html += `<div class="poem-line">${parsed.lines[i]}</div>`;
              if (i < parsed.lines.length - 1 && (i + 1) % 2 === 0) {
                html += '<hr class="poem-divider">';
              }
            }
            html += '</div>';
            card.innerHTML = html;
            fragment.appendChild(card);
            continue;
          }
        } catch(e) {}
      }
      const el = document.createElement('span');
      el.className = 'result-item';
      el.textContent = item;
      fragment.appendChild(el);
    }
    resultsArea.appendChild(fragment);

    const children = resultsArea.children;
    if (children.length > MAX_DISPLAY) {
      while (children.length > MAX_DISPLAY) children[0].remove();
    }

    resultCounter.textContent = `显示 ${children.length} ${currentMode === 'poetry' ? '首' : '条'}`;
    resultsArea.scrollTop = resultsArea.scrollHeight;
  });
}

function fetchStats() {
  fetch(`/api/stats?session_id=${encodeURIComponent(sessionId)}`)
    .then(r => r.json())
    .then(data => {
      const isPoetry = data.mode === 'poetry';
      const genLabel = document.getElementById('genCountLabel');
      const totalLabel = document.getElementById('totalEstimateLabel');
      if (genLabel) genLabel.textContent = isPoetry ? '已生成诗' : '已生成';
      if (totalLabel) totalLabel.textContent = isPoetry ? '估算诗数' : '估算总数';

      genCount.textContent = formatNumStr(String(data.generated || 0));
      totalEstimate.textContent = formatNumStr(data.total || '0');
      genRate.textContent = formatNum(Math.round(data.rate || 0));
      genElapsed.textContent = formatTime(data.elapsed || 0);

      const gen = parseInt(data.generated) || 0;
      const totalStr = data.total || '0';
      if (totalStr.length <= 12) {
        const total = parseInt(totalStr);
        if (total > 0) {
          const pct = Math.min((gen / total) * 100, 100);
          progressFill.style.width = pct + '%';
          progressPercent.textContent = pct.toFixed(4) + '%';
          progressLabel.textContent = isRunning ? '生成中...' : (gen >= total ? '完成！' : (isPaused ? '已暂停' : '已停止'));
          return;
        }
      }
      progressFill.style.width = '0%';
      progressPercent.textContent = '过大';
      progressLabel.textContent = isRunning ? '生成中...' : (isPaused ? '已暂停' : '已停止');
    })
    .catch(() => {});
}

function updateUI() {
  startBtn.disabled = isRunning || isPaused;
  startBtn.style.display = isPaused ? 'none' : '';
  pauseBtn.style.display = isRunning && !isPaused ? '' : 'none';
  resumeBtn.style.display = isPaused ? '' : 'none';
  stopBtn.disabled = !isRunning && !isPaused;
  saveBtn.disabled = !isRunning && !isPaused && resultCount === 0;
  saveStateBtn.disabled = !isPaused;
  saveStateBtn.style.display = isPaused ? '' : 'none';
  pauseOverlay.style.display = isPaused ? 'block' : 'none';

  if (!isRunning && !isPaused) {
    progressLabel.textContent = resultCount > 0 ? '已停止' : '等待开始...';
  }
}

// Save combined results to .gz
async function saveGeneration() {
  const compress = compressCheck.checked;
  saveProgress.classList.add('active');
  saveFill.style.width = '0%';
  saveText.textContent = '正在枚举并保存...';

  const savePayload = currentPresetName
    ? { session_id: sessionId, preset: currentPresetName, max_length: currentMaxLen, compress }
    : { session_id: sessionId, chars: currentChars, max_length: currentMaxLen, compress };

  try {
    const resp = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(savePayload)
    });
    const data = await resp.json();
    if (data.status === 'saving') {
      const pollTimer = setInterval(async () => {
        const sr = await fetch(`/api/save_status?session_id=${encodeURIComponent(sessionId)}`);
        const sd = await sr.json();
        if (sd.saving) {
          saveFill.style.width = sd.progress + '%';
          saveText.textContent = `保存中... ${sd.progress.toFixed(1)}%`;
        } else {
          clearInterval(pollTimer);
          saveFill.style.width = '100%';
          saveText.textContent = `✓ 保存完成！文件: ${sd.file} (${formatNum(sd.count)} 条)`;
          showToast(`保存完成！共 ${formatNum(sd.count)} 条 → ${sd.file}`);
          setTimeout(() => saveProgress.classList.remove('active'), 4000);
        }
      }, 500);
    }
  } catch(e) {
    saveText.textContent = '✕ 保存失败: ' + e.message;
    showToast('保存失败', 3000);
  }
}

// ============================================================
// Pause / Resume / Start / Stop
// ============================================================

async function pauseGeneration() {
  try {
    await fetch('/api/pause', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
  } catch(e) {}

  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }
  isRunning = false;
  isPaused = true;
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
  updateUI();
  fetchStats();
  showToast('已暂停，可继续或保存状态', 2000);
}

async function resumeGeneration() {
  if (isRunning) return;
  try {
    const body = { session_id: sessionId };
    if (pausedState) {
      body.state = pausedState;
      pausedState = null;
    }
    const resp = await fetch('/api/resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (data.error) { showToast('错误: ' + data.error, 3000); return; }
    isPaused = false;
    isRunning = true;
    updateUI();
    if (statsTimer) clearInterval(statsTimer);
    statsTimer = setInterval(fetchStats, 200);
    startStream(true);
    showToast('继续吟诗...', 1500);
  } catch(e) {
    showToast('继续失败: ' + e.message, 3000);
  }
}

async function stopGeneration() {
  try {
    await fetch('/api/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
  } catch(e) {}

  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }
  isRunning = false;
  isPaused = false;
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
  updateUI();
  fetchStats();
  showToast('已停止', 2000);
}

async function startGeneration() {
  if (isRunning || isPaused) return;

  // Clear any restored session
  restoreCard.style.display = 'none';
  pausedState = null;
  try { await fetch('/api/clear_latest', { method: 'POST' }); } catch(e) {}

  currentChars = getCurrentChars();
  const currentPreset = getCurrentPreset();
  currentMaxLen = currentMode === 'poetry' ? getCurrentLineLength() : parseInt(maxLengthInput.value);
  if (!currentMaxLen || currentMaxLen < 1) { showToast('长度必须大于0', 3000); return; }
  if (!currentChars && !currentPreset) { showToast('请选择或输入字符集', 3000); return; }

  resultsArea.innerHTML = '';
  document.getElementById('resultCounter').textContent = currentMode === 'poetry' ? '显示 0 首' : '显示 0 条';
  resultCount = 0;
  displayBuffer = [];
  progressFill.style.width = '0%';
  progressPercent.textContent = '0%';
  progressLabel.textContent = '启动中...';
  saveProgress.classList.remove('active');
  pauseOverlay.style.display = 'none';

  sessionId = 'default_' + Date.now();

  const mode = currentMode;
  const poetryLineLen = getCurrentLineLength();
  const linesPerPoem = 4;
  const payloadMode = mode;
  const payloadMaxLen = mode === 'poetry' ? poetryLineLen * linesPerPoem : currentMaxLen;

  const payload = currentPreset
    ? { session_id: sessionId, preset: currentPreset, max_length: payloadMaxLen, mode: payloadMode }
    : { session_id: sessionId, chars: currentChars, max_length: payloadMaxLen, mode: payloadMode };

  try {
    const resp = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (data.error) { showToast('错误: ' + data.error, 3000); return; }

    isRunning = true;
    currentPresetName = currentPreset;
    updateUI();
    startStream();
    if (statsTimer) clearInterval(statsTimer);
    statsTimer = setInterval(fetchStats, 200);

    const totalDisplay = data.total.length > 12 ? '过大' : formatNumStr(data.total);
    showToast(`开始枚举！组合总数: ${totalDisplay}`, 2000);
  } catch(e) {
    showToast('启动失败: ' + e.message, 3000);
  }
}

// ============================================================
// Save / Load state to/from disk
// ============================================================

async function saveStateToDisk() {
  try {
    const resp = await fetch('/api/save_state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    const data = await resp.json();
    if (data.status === 'saved') {
      showToast(`状态已保存到文件: ${data.file}`, 3000);
      refreshStatesList();
    } else {
      showToast('保存状态失败', 3000);
    }
  } catch(e) {
    showToast('保存状态失败: ' + e.message, 3000);
  }
}

async function refreshStatesList() {
  try {
    const resp = await fetch('/api/list_states');
    const files = await resp.json();
    if (files.length === 0) {
      statesCard.style.display = 'none';
      return;
    }
    statesCard.style.display = 'block';
    statesList.innerHTML = '';
    for (const f of files) {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)';
      div.innerHTML = `
        <span style="font-size:0.85em;color:var(--text-secondary)">
          ${f.filename}<br>
          <small>已生成 ${formatNumStr(String(f.generated))} / ${formatNumStr(f.total)} | 字符集 ${f.chars_len} 字符 × 最长 ${f.max_length}</small>
        </span>
        <button class="btn btn-jade" style="padding:4px 12px;font-size:0.8em" onclick="loadStateFromDisk('${f.filename}')">加载</button>
      `;
      statesList.appendChild(div);
    }
  } catch(e) {}
}

async function loadStateFromDisk(filename) {
  if (isRunning) { showToast('请先停止当前生成', 2000); return; }
  try {
    const resp = await fetch(`/api/load_state/${encodeURIComponent(filename)}`);
    const state = await resp.json();
    if (state.error) { showToast('加载失败', 3000); return; }

    // Populate the UI with loaded state
    pausedState = state;
    const chars = state.chars || '';
    const restoredMode = state._poem_buffer ? 'poetry' : 'enum';
    setMode(restoredMode);
    if (restoredMode === 'poetry') {
      for (const r of document.querySelectorAll('input[name="lineLength"]')) {
        if (parseInt(r.value) === state.max_length) r.checked = true;
      }
      document.getElementById('customLineLen').value = state.max_length || 5;
    }
    currentMaxLen = state.max_length || 1;
    maxLengthInput.value = state.max_length || 1;

    // Set preset or custom
    if (chars.length <= 100) {
      customCharset.value = chars;
    } else {
      customCharset.value = '';
      // Try to find matching preset
      let foundPreset = '';
      for (const [key, p] of Object.entries(presetsData)) {
        if (p.chars === chars) { foundPreset = key; break; }
      }
      if (foundPreset) {
        presetSelect.value = foundPreset;
      } else {
        customCharset.value = '[已加载状态] 自定义字符集';
      }
    }

    currentChars = chars;
    sessionId = 'default_' + Date.now();
    resultCount = state.generated || 0;

    // Show stats from loaded state
    genCount.textContent = formatNumStr(String(state.generated || 0));
    progressLabel.textContent = `已加载状态 (${formatNumStr(String(state.generated || 0))} 条已生成)`;

    // Setup resume
    isPaused = true;
    isRunning = false;
    updateUI();
    showToast(`已加载状态: ${filename}`, 3000);
  } catch(e) {
    showToast('加载失败: ' + e.message, 3000);
  }
}

// ============================================================
// Auto-restore session across refresh
// ============================================================

async function checkLatestSession() {
  try {
    const resp = await fetch('/api/latest_session');
    const data = await resp.json();
    if (data.state) {
      const s = data.state;
      const info = `字符集 ${s.chars ? s.chars.length : 0} 字符 × 最长 ${s.max_length} | 已生成 ${formatNumStr(String(s.generated || 0))} 条`;
      restoreInfo.textContent = info;
      restoreCard.dataset.state = JSON.stringify(s);
      restoreCard.style.display = 'block';
    }
  } catch(e) {}
}

async function restoreLatestSession() {
  const raw = restoreCard.dataset.state;
  if (!raw) return;
  const state = JSON.parse(raw);
  restoreCard.style.display = 'none';

  pausedState = state;
  const chars = state.chars || '';
  const restoredMode = state._poem_buffer ? 'poetry' : 'enum';
  setMode(restoredMode);
  if (restoredMode === 'poetry') {
    for (const r of document.querySelectorAll('input[name="lineLength"]')) {
      if (parseInt(r.value) === state.max_length) r.checked = true;
    }
    document.getElementById('customLineLen').value = state.max_length || 5;
  }
  currentMaxLen = state.max_length || 1;
  maxLengthInput.value = state.max_length || 1;

  if (chars.length <= 100) {
    customCharset.value = chars;
  } else {
    customCharset.value = '';
    let foundPreset = '';
    for (const [key, p] of Object.entries(presetsData)) {
      if (p.chars === chars) { foundPreset = key; break; }
    }
    if (foundPreset) {
      presetSelect.value = foundPreset;
    } else {
      customCharset.value = '[已恢复] 自定义字符集';
    }
  }

  currentChars = chars;
  sessionId = 'default_' + Date.now();
  resultCount = state.generated || 0;

  genCount.textContent = formatNumStr(String(state.generated || 0));
  progressLabel.textContent = `已恢复会话 (${formatNumStr(String(state.generated || 0))} 条已生成)`;

  isPaused = true;
  isRunning = false;
  updateUI();
  showToast('已恢复上次会话，点击继续吟诗', 3000);
}

async function dismissLatestSession() {
  restoreCard.style.display = 'none';
  try {
    await fetch('/api/clear_latest', { method: 'POST' });
  } catch(e) {}
}

// ============================================================
// Event listeners
// ============================================================
startBtn.addEventListener('click', startGeneration);
pauseBtn.addEventListener('click', pauseGeneration);
resumeBtn.addEventListener('click', resumeGeneration);
stopBtn.addEventListener('click', stopGeneration);
saveBtn.addEventListener('click', saveGeneration);
saveStateBtn.addEventListener('click', saveStateToDisk);
restoreBtn.addEventListener('click', restoreLatestSession);
dismissRestoreBtn.addEventListener('click', dismissLatestSession);

// Override stop to also pause state cleanup
const origStop = stopBtn.click;
document.querySelector('#stopBtn').addEventListener('click', () => {
  isPaused = false;
  pausedState = null;
});

// Init
loadPresets();
updateUI();
refreshStatesList();
checkLatestSession();

// Auto-save on page unload
window.addEventListener('beforeunload', () => {
  if (isRunning || isPaused) {
    navigator.sendBeacon('/api/auto_save', JSON.stringify({ session_id: sessionId }));
  }
});

setInterval(() => {
  if (!isRunning) fetchStats();
}, 2000);
setInterval(refreshStatesList, 10000);
